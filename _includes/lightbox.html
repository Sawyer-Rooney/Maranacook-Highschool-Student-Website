<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  var currentImages = [];
  var currentIndex = 0;
  var currentMode = 'image';
  var currentPdf = null;
  var currentPdfPage = 1;
  var currentPdfTotalPages = 0;

  var sliderValues = { zoom: 1, x: 0, y: 0 };

  function createSlider(id, min, max, value, onchange) {
    var wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative; width:120px; height:16px; cursor:pointer;';
    
    var track = document.createElement('div');
    track.style.cssText = 'position:absolute; top:50%; left:0; width:100%; height:4px; background:#3a3a3a; border-radius:2px; transform:translateY(-50%);';
    
    var fill = document.createElement('div');
    fill.id = id + '-fill';
    fill.style.cssText = 'position:absolute; top:0; left:0; height:100%; background:#f5c518; border-radius:2px;';
    
    var thumb = document.createElement('div');
    thumb.id = id + '-thumb';
    thumb.style.cssText = 'position:absolute; top:50%; width:16px; height:16px; background:#f5c518; border-radius:50%; transform:translate(-50%, -50%); cursor:grab;';
    
    track.appendChild(fill);
    wrap.appendChild(track);
    wrap.appendChild(thumb);
    wrap.id = id + '-track';

    function updatePosition(val) {
      var pct = (val - min) / (max - min);
      thumb.style.left = (pct * 100) + '%';
      fill.style.width = (pct * 100) + '%';
    }

    function getValueFromEvent(e) {
      var rect = wrap.getBoundingClientRect();
      var clientX = e.touches ? e.touches[0].clientX : e.clientX;
      var pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      return min + pct * (max - min);
    }

    function onDrag(e) {
      e.preventDefault();
      var val = getValueFromEvent(e);
      sliderValues[id.replace('-slider', '')] = val;
      updatePosition(val);
      onchange(val);
    }

    function onEnd() {
      document.removeEventListener('mousemove', onDrag);
      document.removeEventListener('mouseup', onEnd);
      document.removeEventListener('touchmove', onDrag);
      document.removeEventListener('touchend', onEnd);
      thumb.style.cursor = 'grab';
    }

    wrap.addEventListener('mousedown', function(e) {
      thumb.style.cursor = 'grabbing';
      onDrag(e);
      document.addEventListener('mousemove', onDrag);
      document.addEventListener('mouseup', onEnd);
    });

    wrap.addEventListener('touchstart', function(e) {
      onDrag(e);
      document.addEventListener('touchmove', onDrag, { passive: false });
      document.addEventListener('touchend', onEnd);
    }, { passive: false });

    updatePosition(value);
    wrap._update = updatePosition;
    wrap._min = min;
    wrap._max = max;
    return wrap;
  }

  function getSliderValue(id) {
    var key = id.replace('-slider', '');
    return sliderValues[key] || 0;
  }

  function setSliderValue(id, val) {
    var key = id.replace('-slider', '');
    sliderValues[key] = val;
    var track = document.getElementById(id + '-track');
    if (track) track._update(val);
    if (id === 'zoom-slider') {
      document.getElementById('zoom-label').textContent = parseFloat(val).toFixed(1) + 'x';
    }
  }

  document.addEventListener('DOMContentLoaded', function() {
    var lb = document.createElement('div');
    lb.id = 'lightbox';
    lb.setAttribute('onclick', 'handleLightboxClick(event)');
    lb.style.cssText = 'display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:2147483647; justify-content:center; align-items:center; flex-direction:column;';

    var controls = document.createElement('div');
    controls.style.cssText = 'position:fixed; top:90px; left:0; width:100%; display:flex; justify-content:space-between; align-items:center; padding:0 30px; box-sizing:border-box; z-index:2147483647;';

    var slidersWrap = document.createElement('div');
    slidersWrap.style.cssText = 'display:flex; align-items:center; gap:0.8em; flex-wrap:wrap;';

    function makeSliderGroup(label, id, min, max, value, onchange) {
      var group = document.createElement('div');
      group.style.cssText = 'display:flex; align-items:center; gap:0.4em; white-space:nowrap;';
      var lbl = document.createElement('span');
      lbl.style.cssText = 'color:#f0f0f0; font-size:0.9em;';
      lbl.textContent = label;
      group.appendChild(lbl);
      group.appendChild(createSlider(id, min, max, value, onchange));
      return group;
    }

    var zoomLabel = document.createElement('span');
    zoomLabel.id = 'zoom-label';
    zoomLabel.style.cssText = 'color:#f0f0f0; font-size:0.9em;';
    zoomLabel.textContent = '1x';

    var zoomGroup = makeSliderGroup('Zoom', 'zoom-slider', 1, 3, 1, function(val) {
      sliderValues.zoom = val;
      zoomLabel.textContent = parseFloat(val).toFixed(1) + 'x';
      panImage();
    });
    zoomGroup.appendChild(zoomLabel);

    slidersWrap.appendChild(zoomGroup);
    slidersWrap.appendChild(makeSliderGroup('X', 'x-slider', -100, 100, 0, function(val) {
      sliderValues.x = val;
      panImage();
    }));
    slidersWrap.appendChild(makeSliderGroup('Y', 'y-slider', -100, 100, 0, function(val) {
      sliderValues.y = val;
      panImage();
    }));

    var closeBtn = document.createElement('button');
    closeBtn.innerHTML = '&times;';
    closeBtn.style.cssText = 'font-size:2em; color:#f0f0f0; background:none; border:none; cursor:pointer; outline:none;';
    closeBtn.onclick = closeLightbox;

    controls.appendChild(slidersWrap);
    controls.appendChild(closeBtn);
    lb.appendChild(controls);

    lb.innerHTML += `
      <div style="position:fixed; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:space-between; pointer-events:none; z-index:2147483647;">
        <div id="prev-btn" onclick="handlePrev()" style="pointer-events:all; background:rgba(0,0,0,0.5); cursor:pointer; display:none; width:60px; height:60px; border-radius:50%; margin-left:15px; user-select:none; align-items:center; justify-content:center;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f0f0f0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </div>
        <div id="next-btn" onclick="handleNext()" style="pointer-events:all; background:rgba(0,0,0,0.5); cursor:pointer; display:none; width:60px; height:60px; border-radius:50%; margin-right:15px; user-select:none; align-items:center; justify-content:center;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f0f0f0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
      </div>
      <canvas id="lightbox-canvas" style="display:none; max-width:80%; max-height:75%; border-radius:6px; margin-top:80px;"></canvas>
      <img id="lightbox-img" src="" style="display:none; max-width:80%; max-height:75%; border-radius:6px; margin-top:80px;">
      <span id="gallery-counter" style="display:none; color:#f0f0f0; background:rgba(0,0,0,0.5); border-radius:8px; padding:0.3em 0.8em; font-size:0.9em; position:fixed; bottom:30px; left:50%; transform:translateX(-50%); z-index:2147483647;"></span>
    `;

    document.body.appendChild(lb);

    var thumbnails = document.querySelectorAll('.pdf-thumbnail');
    thumbnails.forEach(function(canvas) {
      var pdfUrl = canvas.getAttribute('data-pdf');
      pdfjsLib.getDocument(pdfUrl).promise.then(function(pdf) {
        pdf.getPage(1).then(function(page) {
          var viewport = page.getViewport({ scale: 0.5 });
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport });
        });
      });
    });
  });

  function resetSliders() {
    sliderValues = { zoom: 1, x: 0, y: 0 };
    setSliderValue('zoom-slider', 1);
    setSliderValue('x-slider', 0);
    setSliderValue('y-slider', 0);
  }

  function applyTransform(target) {
    var zoom = sliderValues.zoom || 1;
    var x = sliderValues.x || 0;
    var y = sliderValues.y || 0;
    var w = target.offsetWidth;
    var h = target.offsetHeight;
    var scaledX = -(x / 100) * (w / 2);
    var scaledY = (y / 100) * (h / 2);
    target.style.transform = 'scale(' + zoom + ') translate(' + scaledX + 'px, ' + scaledY + 'px)';
  }

  function panImage() {
    var target = currentMode === 'pdf' ?
      document.getElementById('lightbox-canvas') :
      document.getElementById('lightbox-img');
    applyTransform(target);
  }

  function zoomImage(value) {
    sliderValues.zoom = parseFloat(value);
    document.getElementById('zoom-label').textContent = parseFloat(value).toFixed(1) + 'x';
    panImage();
  }

  function openPdf(pdfUrl) {
    currentMode = 'pdf';
    currentPdfPage = 1;
    document.getElementById('lightbox-img').style.display = 'none';
    document.getElementById('lightbox-canvas').style.display = 'block';
    document.getElementById('lightbox-canvas').style.transform = 'scale(1) translate(0px, 0px)';
    resetSliders();
    document.getElementById('lightbox').style.display = 'flex';
    pdfjsLib.getDocument(pdfUrl).promise.then(function(pdf) {
      currentPdf = pdf;
      currentPdfTotalPages = pdf.numPages;
      renderPdfPage(currentPdfPage);
      document.getElementById('prev-btn').style.display = 'flex';
      document.getElementById('next-btn').style.display = 'flex';
      document.getElementById('gallery-counter').style.display = 'block';
    });
  }

  function renderPdfPage(pageNum) {
    currentPdf.getPage(pageNum).then(function(page) {
      var visibleCanvas = document.getElementById('lightbox-canvas');
      var offscreen = document.createElement('canvas');
      var viewport = page.getViewport({ scale: 1.5 });
      offscreen.width = viewport.width;
      offscreen.height = viewport.height;
      page.render({ canvasContext: offscreen.getContext('2d'), viewport: viewport }).promise.then(function() {
        visibleCanvas.width = offscreen.width;
        visibleCanvas.height = offscreen.height;
        visibleCanvas.getContext('2d').drawImage(offscreen, 0, 0);
        resetSliders();
        visibleCanvas.style.transform = 'scale(1) translate(0px, 0px)';
        document.getElementById('gallery-counter').textContent = 'Page ' + pageNum + ' / ' + currentPdfTotalPages;
      });
    });
  }

  function handlePrev() {
    if (currentMode === 'pdf') {
      if (currentPdfPage > 1) {
        currentPdfPage--;
        renderPdfPage(currentPdfPage);
      }
    } else {
      changeImage(-1);
    }
  }

  function handleNext() {
    if (currentMode === 'pdf') {
      if (currentPdfPage < currentPdfTotalPages) {
        currentPdfPage++;
        renderPdfPage(currentPdfPage);
      }
    } else {
      changeImage(1);
    }
  }

  function openLightbox(img) {
    currentMode = 'image';
    currentImages = [];
    currentIndex = 0;
    document.getElementById('lightbox-canvas').style.display = 'none';
    document.getElementById('lightbox-img').style.display = 'block';
    document.getElementById('lightbox-img').src = img.src;
    resetSliders();
    document.getElementById('lightbox-img').style.transform = 'scale(1) translate(0px, 0px)';
    document.getElementById('prev-btn').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('gallery-counter').style.display = 'none';
    document.getElementById('lightbox').style.display = 'flex';
  }

  function openGallery(index, img) {
    currentMode = 'image';
    document.getElementById('lightbox-canvas').style.display = 'none';
    document.getElementById('lightbox-img').style.display = 'block';
    var allImgs = img.closest('.gallery-grid').querySelectorAll('img');
    currentImages = Array.from(allImgs).map(function(i) { return i.src; });
    currentIndex = index;
    showGalleryImage();
    document.getElementById('prev-btn').style.display = 'flex';
    document.getElementById('next-btn').style.display = 'flex';
    document.getElementById('gallery-counter').style.display = 'block';
    resetSliders();
    document.getElementById('lightbox').style.display = 'flex';
  }

  function showGalleryImage() {
    resetSliders();
    document.getElementById('lightbox-img').style.transform = 'scale(1) translate(0px, 0px)';
    document.getElementById('lightbox-img').src = currentImages[currentIndex];
    document.getElementById('gallery-counter').textContent = (currentIndex + 1) + ' / ' + currentImages.length;
  }

  function changeImage(direction) {
    currentIndex = (currentIndex + direction + currentImages.length) % currentImages.length;
    showGalleryImage();
  }

  function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
    document.getElementById('prev-btn').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    currentPdf = null;
    currentMode = 'image';
  }

  function handleLightboxClick(event) {
    if (event.target === document.getElementById('lightbox')) {
      closeLightbox();
    }
  }

  function loadVideo(el, videoId) {
    var iframe = document.createElement('iframe');
    iframe.width = '560';
    iframe.height = '315';
    iframe.src = 'https://www.youtube-nocookie.com/embed/' + videoId + '?autoplay=1';
    iframe.frameBorder = '0';
    iframe.allowFullscreen = true;
    el.parentNode.replaceChild(iframe, el);
  }

  document.addEventListener('keydown', function(e) {
    if (document.getElementById('lightbox') && document.getElementById('lightbox').style.display === 'flex') {
      if (e.key === 'ArrowLeft') handlePrev();
      if (e.key === 'ArrowRight') handleNext();
      if (e.key === 'a' || e.key === 'A') {
        sliderValues.x = Math.max(-100, sliderValues.x - 5);
        setSliderValue('x-slider', sliderValues.x);
        panImage();
      }
      if (e.key === 'd' || e.key === 'D') {
        sliderValues.x = Math.min(100, sliderValues.x + 5);
        setSliderValue('x-slider', sliderValues.x);
        panImage();
      }
      if (e.key === 's' || e.key === 'S') {
        sliderValues.y = Math.max(-100, sliderValues.y - 5);
        setSliderValue('y-slider', sliderValues.y);
        panImage();
      }
      if (e.key === 'w' || e.key === 'W') {
        sliderValues.y = Math.min(100, sliderValues.y + 5);
        setSliderValue('y-slider', sliderValues.y);
        panImage();
      }
      if (e.key === 'Escape') closeLightbox();
    }
  });

  document.addEventListener('wheel', function(e) {
    if (document.getElementById('lightbox') && document.getElementById('lightbox').style.display === 'flex') {
      e.preventDefault();
      var delta = e.deltaY;
      if (e.deltaMode === 0) {
        delta = delta * 0.005;
      } else {
        delta = delta * 0.1;
      }
      var newVal = Math.min(3, Math.max(1, sliderValues.zoom - delta));
      sliderValues.zoom = newVal;
      setSliderValue('zoom-slider', newVal);
      panImage();
    }
  }, { passive: false });
</script>
